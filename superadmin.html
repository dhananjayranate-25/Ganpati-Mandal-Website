<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Shivsrushti Boyz</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #d4af37;
            --dark: #121212;
            --darker: #0a0a0a;
            --light: #f4f4f4;
            --danger: #ff4444;
            --success: #00C851;
            --info: #33b5e5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--darker);
            color: var(--light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background: var(--dark);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }
        .sidebar-header h2 {
            margin: 0;
            color: var(--primary);
        }
        .member-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .member-item {
            background: var(--glass-bg);
            border: 1px solid transparent;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .member-item:hover, .member-item.active {
            border-color: var(--primary);
            background: rgba(255, 204, 0, 0.1);
        }
        .member-item h4 {
            margin: 0;
        }
        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .top-bar h2 { margin: 0; }
        
        .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));gap:20px;}
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            margin-top: 0;
            color: #ccc;
            font-size: 1rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0 0 0;
        }
        
        .lists-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:20px;flex:1;}
        .list-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }
        .list-header h3 { margin: 0; color: #ccc; }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.pending { background: rgba(255,68,68,0.2); color: var(--danger); }
        .badge.process { background: rgba(51,181,229,0.2); color: var(--info); }
        .badge.done { background: rgba(0,200,81,0.2); color: var(--success); }

        .btn {
            background: var(--primary);
            color: var(--darker);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content{
            background: var(--dark);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        max-height:90vh;overflow-y:auto;}
        .modal-title { margin-top: 0; color: var(--primary); }

        #memberDashboard { display: none; }
        .empty-state { text-align: center; color: #666; margin-top: 50px; }
    
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .floating-label {
            position: relative;
            margin-bottom: 20px;
        }
        .floating-label input,
        .floating-label select,
        .floating-label textarea {
            width: 100%;
            padding: 24px 16px 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .floating-label label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            pointer-events: none;
            font-size: 1rem;
        }
        .floating-label textarea ~ label {
            top: 24px;
        }
        .floating-label input:focus,
        .floating-label select:focus,
        .floating-label textarea:focus {
            outline: none;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.05);
        }
        .floating-label input:focus + label,
        .floating-label input:not(:placeholder-shown) + label,
        .floating-label select:focus + label,
        .floating-label select:not([value=""]) + label,
        .floating-label textarea:focus + label,
        .floating-label textarea:not(:placeholder-shown) + label {
            top: 8px;
            font-size: 0.75rem;
            color: #ffcc00;
        }

    
        /* Premium Mobile Responsiveness */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .navbar h2 {
                font-size: 1.5rem;
            }
            .main-content {
                padding: 15px;
                gap: 20px;
            }
            .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));gap:20px;}
            .lists-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:20px;flex:1;}
            .list-container {
                padding: 15px;
            }
            .list-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .list-header .btn {
                width: 100%;
                text-align: center;
            }
            .item-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .item-row > div:first-child {
                width: 100%;
                word-wrap: break-word;
            }
            .item-row select, .item-row .badge {
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
            .floating-label input,
            .floating-label select,
            .floating-label textarea {
                padding: 22px 12px 6px;
                font-size: 0.95rem;
            }
            .form-grid {
                gap: 15px;
            }
            /* Make buttons inside cards full width on mobile */
            div[style*="justify-content:flex-end"] {
                flex-direction: column;
                gap: 10px !important;
            }
            div[style*="justify-content:flex-end"] button {
                width: 100%;
                justify-content: center;
            }
            
            /* Responsive timeline layout for mobile */
            div[style*="border-left: 3px solid"] {
                padding: 12px !important;
                margin-bottom: 12px !important;
            }
            div[style*="justify-content: space-between"] {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 8px;
            }
            
            /* Mobile Sidebar overlay */
            .menu-toggle {
                display: none;
                background: none;
                border: none;
                color: var(--primary);
                font-size: 1.5rem;
                cursor: pointer;
            }
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100dvh; /* Use dvh to fix mobile browser bottom cutoff */
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.active {
                left: 0;
            }
            .main-content {
                padding: 10px;
            }
            .top-bar {
                padding: 10px;
            }
            .lists-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:20px;flex:1;}
            .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));gap:20px;}
            /* Overlay background when sidebar is open */
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

    
/* Premium Aesthetic Enhancements */
.card, .list-container {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover, .list-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255, 204, 0, 0.15);
    border-color: var(--primary);
}
.btn, .btn-outline {
    transition: all 0.2s ease;
}
.btn:active, .btn-outline:active {
    transform: scale(0.95);
}
.item-row {
    transition: background 0.2s;
}
.item-row:hover {
    background: rgba(255, 204, 0, 0.1);
}
\n
/* Premium Aesthetic Enhancements */
.card, .list-container, .event-card, .committee-card, .expense-card {
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
}
.card:hover, .list-container:hover, .event-card:hover, .committee-card:hover, .expense-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255, 204, 0, 0.15);
    border-color: var(--primary);
}
.btn, .btn-outline, .action-btn {
    transition: all 0.2s ease;
}
.btn:active, .btn-outline:active, .action-btn:active {
    transform: scale(0.95);
}
.item-row {
    transition: background 0.2s;
}
.item-row:hover {
    background: rgba(255, 204, 0, 0.1);
}
/* Responsive Tables */
.table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    width: 100%;
}
table {
    width: 100%;
    min-width: 500px; /* Ensures table doesn't squish too much on mobile */
}
/* Form Grid Mobile Fix */
@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr !important;
    }
}

</style>
</head>
<body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Super Admin</h2>
        </div>
        <div class="member-list" id="memberList">
            <!-- Members will load here -->
        </div>
        <div class="sidebar-footer">
            <button class="btn btn-outline" style="flex: 1;" onclick="openModal('addMemberModal')"><i class="fas fa-plus"></i> Add</button>
            <button class="btn" style="flex: 1; background: #444; color: white;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div>
                    <h2 id="dashboardTitle" style="margin-bottom: 5px;">Select a Member</h2>
                    <div id="dashboardCreds" style="display:none; font-size: 0.85rem; color: #aaa;">
                        <i class="fas fa-user"></i> <span id="credUser"></span> &nbsp;|&nbsp; 
                        <i class="fas fa-key"></i> <span id="credPass"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="noSelection" style="display:none;"></div>

        <div id="memberDashboard">
            <div id="dashboardActions" style="display:none; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="btn btn-outline" style="flex:1; min-width:100px; justify-content:center; display:flex; align-items:center;" onclick="openEditModal()"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-outline" style="flex:1; min-width:100px; justify-content:center; display:flex; align-items:center; color: var(--danger); border-color: var(--danger);" onclick="deleteMember()"><i class="fas fa-trash"></i> Delete</button>
                <button class="btn" style="flex:1; min-width:140px; justify-content:center; display:flex; align-items:center;" onclick="openModal('addFundsModal')"><i class="fas fa-rupee-sign"></i> Add Funds</button>
            </div>
            <div class="dashboard-grid">
                <div class="card">
                    <h3>Total Funds Given <i class="fas fa-wallet text-muted"></i></h3>
                    <p class="stat-value" id="statTotalFunds">₹0</p>
                </div>
                <div class="card">
                    <h3>Total Spent <i class="fas fa-shopping-cart text-muted"></i></h3>
                    <p class="stat-value" id="statTotalSpent" style="color: var(--danger);">₹0</p>
                </div>
                <div class="card">
                    <h3>Remaining Balance <i class="fas fa-piggy-bank text-muted"></i></h3>
                    <p class="stat-value" id="statBalance" style="color: var(--success);">₹0</p>
                </div>
            </div>

            <div class="lists-grid">
                <!-- Tasks List -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>Tasks Assigned</h3>
                        <button class="btn btn-outline" style="padding: 4px 10px; font-size: 0.8rem;" onclick="openModal('addTaskModal')">Add Task</button>
                    </div>
                    <div style="flex:1; overflow-y:auto;" id="tasksList">
                        <!-- Tasks go here -->
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>Expenses Logged</h3>
                    </div>
                    <div style="flex:1; overflow-y:auto;" id="expensesList">
                        <!-- Expenses go here -->
                    </div>
                </div>
            </div>

            <div class="lists-grid" style="margin-top: 30px;">
                <!-- Add Niyojan Card -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>उत्सव नियोजन जोडा (Add Niyojan)</h3>
                    </div>
                    <div style="padding: 15px;">
                        <form onsubmit="addNiyojan(event)">
                            <div class="form-grid">
                                <div class="form-group floating-label">
                                    <input type="date" id="saNiyojanDate" placeholder=" " required>
                                    <label for="saNiyojanDate">तारीख</label>
                                </div>
                                <div class="form-group floating-label">
                                    <input type="time" id="saNiyojanTime" placeholder=" " required>
                                    <label for="saNiyojanTime">वेळ</label>
                                </div>
                                <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                    <input type="text" id="saNiyojanTitle" placeholder=" " required>
                                    <label for="saNiyojanTitle">कार्यक्रमाचे नाव</label>
                                </div>
                                <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                    <textarea id="saNiyojanDesc" placeholder=" " rows="3"></textarea>
                                    <label for="saNiyojanDesc">अधिक माहिती (पर्यायी)</label>
                                </div>
                            </div>
                            <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1.1rem; border-radius: 8px;">नियोजन जोडा</button>
                        </form>
                    </div>
                </div>

                <!-- Add Aarti Card -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>महाआरती जोडा (Add Aarti)</h3>
                    </div>
                    <div style="padding: 15px;">
                        <form onsubmit="addAarti(event)" class="form-grid">
                            <div class="form-group floating-label">
                                <input type="text" id="saAartiName" placeholder=" " required>
                                <label for="saAartiName">नाव</label>
                            </div>
                            <div class="form-group floating-label">
                                <input type="date" id="saAartiDate" placeholder=" " required>
                                <label for="saAartiDate">तारीख</label>
                            </div>
                            <div class="form-group floating-label select-group">
                                <select id="saAartiTime" required>
                                    <option value="सकाळ">सकाळ</option>
                                    <option value="संध्याकाळ">संध्याकाळ</option>
                                </select>
                                <label for="saAartiTime">वेळ (सकाळ/संध्याकाळ)</label>
                            </div>
                            <div class="form-group floating-label">
                                <input type="text" id="saAartiPhone" placeholder=" ">
                                <label for="saAartiPhone">फोन नंबर</label>
                            </div>
                            <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                <textarea id="saAartiDetails" placeholder=" " rows="2"></textarea>
                                <label for="saAartiDetails">पूजा माहिती (ऐच्छिक)</label>
                            </div>
                            <div style="grid-column: 1 / -1;">
                                <button type="submit" class="btn" style="width: 100%; margin-top: 5px; padding: 12px; font-size: 1.1rem; border-radius: 8px;">आरती जोडा</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Add Member Modal -->
    <div class="modal" id="addMemberModal">
        <div class="modal-content">
            <h3 class="modal-title">Add New Member</h3>
            <form onsubmit="addMember(event)">
                <input type="text" id="memName" class="form-control" placeholder="Full Name" required>
                <input type="text" id="memUser" class="form-control" placeholder="Username (for login)" required>
                <input type="password" id="memPass" class="form-control" placeholder="Password" required>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Add Member</button>
                </div>
            </form>
        </div>
    </div>

    
    <!-- Edit Member Modal -->
    <div class="modal" id="editMemberModal">
        <div class="modal-content">
            <h3 class="modal-title">Edit Member</h3>
            <form onsubmit="editMember(event)">
                <input type="text" id="editMemName" class="form-control" placeholder="Full Name" required>
                <input type="text" id="editMemUser" class="form-control" placeholder="Username (for login)" required>
                <input type="text" id="editMemPass" class="form-control" placeholder="Password" required>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Update</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal" id="addTaskModal">
        <div class="modal-content">
            <h3 class="modal-title">Assign Task</h3>
            <form onsubmit="addTask(event)">
                <input type="text" id="taskTitle" class="form-control" placeholder="Task description..." required>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Assign</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Funds Modal -->
    <div class="modal" id="addFundsModal">
        <div class="modal-content">
            <h3 class="modal-title">Add Funds</h3>
            <form onsubmit="addFunds(event)">
                <input type="number" id="fundAmount" class="form-control" placeholder="Amount (₹)" required min="1">
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;
        let selectedMemberId = null;
        let selectedMemberData = null;

        // Auth Check
        window.onload = () => {
            const userStr = localStorage.getItem('portalUser');
            if(!userStr) return window.location.href = 'login.html';
            currentUser = JSON.parse(userStr);
            if(currentUser.role !== 'superadmin') return window.location.href = 'login.html';
            loadMembers();
        };

        function logout() {
            localStorage.removeItem('portalUser');
            window.location.href = 'login.html';
        }

        function openModal(id) {
            closeModals();
            document.getElementById(id).classList.add('active');
        }
        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        async function loadMembers() {
            try {
                const res = await fetch(API_URL + '/api/portal/users');
                const data = await res.json();
                if(data.success) {
                    const list = document.getElementById('memberList');
                    list.innerHTML = data.users.map(u => `
                        <div class="member-item ${u._id === selectedMemberId ? 'active' : ''}" onclick="selectMember('${u._id}', '${u.name}')">
                            <h4>${u.name}</h4>
                            <span style="font-size:0.8rem; color:var(--text-muted);">₹${u.balance} left</span>
                        </div>
                    `).join('');
                    
                    if (!selectedMemberId && data.users.length > 0) {
                        selectMember(data.users[0]._id, data.users[0].name);
                    }
                }
            } catch(e) {
                console.error(e);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }
        
        function closeSidebarOnMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
                document.querySelector('.sidebar-overlay').classList.remove('active');
            }
        }

        async function selectMember(id, name) {
            selectedMemberId = id;
            document.getElementById('noSelection').style.display = 'none';
            document.getElementById('memberDashboard').style.display = 'block';
            closeSidebarOnMobile();
            document.getElementById('dashboardActions').style.display = 'block';
            document.getElementById('dashboardTitle').innerText = name + "'s Dashboard";
            document.getElementById('dashboardActions').style.display = 'flex';
            
            // Reload sidebar to show active state
            loadMembers();
            // Load dashboard data
            refreshMemberData();
        }

        async function refreshMemberData() {
            if(!selectedMemberId) return;
            try {
                // Fetch user data
                let res = await fetch(API_URL + '/api/portal/users/' + selectedMemberId);
                let data = await res.json();

                if(data.success) {
                    selectedMemberData = data.user;
                    document.getElementById('statTotalFunds').innerText = '₹' + data.user.totalFunds;
                    document.getElementById('statTotalSpent').innerText = '₹' + data.user.totalSpent;
                    document.getElementById('statBalance').innerText = '₹' + data.user.balance;
                    
                    document.getElementById('dashboardCreds').style.display = 'block';
                    document.getElementById('credUser').innerText = data.user.username;
                    document.getElementById('credPass').innerText = data.user.password;
                }


                // Fetch tasks
                res = await fetch(API_URL + '/api/portal/tasks/' + selectedMemberId);
                data = await res.json();
                if(data.success) {
                    document.getElementById('tasksList').innerHTML = data.tasks.length ? data.tasks.map(t => `
                        <div class="item-row">
                            <div>
                                <div style="font-weight:500;">${t.title}</div>
                                <div style="font-size:0.75rem; color:#888;">${new Date(t.date).toLocaleDateString()}</div>
                            </div>
                            <span class="badge ${t.status === 'Pending' ? 'pending' : (t.status==='Done' ? 'done' : 'process')}">${t.status}</span>
                        </div>
                    `).join('') : '<p class="empty-state">No tasks assigned.</p>';
                }

                // Fetch expenses
                res = await fetch(API_URL + '/api/portal/expenses/' + selectedMemberId);
                data = await res.json();
                if(data.success) {
                    document.getElementById('expensesList').innerHTML = data.expenses.length ? data.expenses.map(e => `
                        <div class="item-row">
                            <div>
                                <div style="font-weight:500;">${e.item}</div>
                                <div style="font-size:0.75rem; color:#888;">${new Date(e.date).toLocaleDateString()}</div>
                            </div>
                            <span style="color:var(--danger); font-weight:bold;">₹${e.price}</span>
                        </div>
                    `).join('') : '<p class="empty-state">No expenses logged.</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function addMember(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(API_URL + '/api/portal/users', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('memName').value,
                        username: document.getElementById('memUser').value,
                        password: document.getElementById('memPass').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    closeModals();
                    e.target.reset();
                    loadMembers();
                } else alert(data.message);
            } catch(err) { alert('Error adding member'); }
            btn.disabled = false;
        }

        async function addTask(e) {
            e.preventDefault();
            if(!selectedMemberId) return;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(API_URL + '/api/portal/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: selectedMemberId,
                        title: document.getElementById('taskTitle').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    closeModals();
                    e.target.reset();
                    refreshMemberData();
                }
            } catch(err) {}
            btn.disabled = false;
        }

        
        function openEditModal() {
            if(!selectedMemberData) return;
            document.getElementById('editMemName').value = selectedMemberData.name;
            document.getElementById('editMemUser').value = selectedMemberData.username;
            document.getElementById('editMemPass').value = selectedMemberData.password;
            openModal('editMemberModal');
        }

        async function editMember(e) {
            e.preventDefault();
            if(!selectedMemberId) return;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(API_URL + '/api/portal/users/' + selectedMemberId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('editMemName').value,
                        username: document.getElementById('editMemUser').value,
                        password: document.getElementById('editMemPass').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    closeModals();
                    document.getElementById('dashboardTitle').innerText = data.user.name + "'s Dashboard";
                    loadMembers();
                    refreshMemberData();
                } else alert(data.message);
            } catch(err) { alert('Error updating member'); }
            btn.disabled = false;
        }

        async function deleteMember() {
            if(!selectedMemberId) return;
            if(!confirm("Are you sure you want to delete this member? All their tasks and expenses will also be deleted!")) return;
            
            try {
                const res = await fetch(API_URL + '/api/portal/users/' + selectedMemberId, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) {
                    selectedMemberId = null;
                    selectedMemberData = null;
                    document.getElementById('noSelection').style.display = 'block';
                    document.getElementById('memberDashboard').style.display = 'none';
                    document.getElementById('dashboardActions').style.display = 'none';
                    document.getElementById('dashboardCreds').style.display = 'none';
                    document.getElementById('dashboardTitle').innerText = 'Select a Member';
                    loadMembers();
                } else alert(data.message);
            } catch(err) { alert('Error deleting member'); }
        }

        
        

        

        async function addFunds(e) {
            e.preventDefault();
            if(!selectedMemberId) return;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(API_URL + '/api/portal/funds', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: selectedMemberId,
                        amount: document.getElementById('fundAmount').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    closeModals();
                    e.target.reset();
                    refreshMemberData();
                }
            } catch(err) {}
            btn.disabled = false;
        }
    
        async function addNiyojan(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const date = document.getElementById('saNiyojanDate').value;
                const time = document.getElementById('saNiyojanTime').value;
                const title = document.getElementById('saNiyojanTitle').value;
                const description = document.getElementById('saNiyojanDesc').value;
                
                // Get name based on page
                let addedByName = '';
                if(typeof currentUser !== 'undefined' && currentUser.name) {
                    addedByName = currentUser.name;
                } else if(typeof selectedMember !== 'undefined' && selectedMember.name) {
                    addedByName = selectedMember.name; // Superadmin portal
                }

                const res = await fetch(API_URL + '/api/niyojan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ date, time, title, description, addedBy: addedByName })
                });
                const data = await res.json();
                if(data.success) {
                    e.target.reset();
                    alert('Niyojan added successfully!');
                    if(typeof loadMyData === 'function') loadMyData();
                } else alert('Error adding niyojan');
            } catch(err) { alert('Server error'); }
            btn.disabled = false;
        }

        async function addAarti(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const name = document.getElementById('saAartiName').value;
                const date = document.getElementById('saAartiDate').value;
                const timeOfDay = document.getElementById('saAartiTime').value;
                const phone = document.getElementById('saAartiPhone').value;
                const pujaDetails = document.getElementById('saAartiDetails').value;
                
                let addedByName = '';
                if(typeof currentUser !== 'undefined' && currentUser.name) {
                    addedByName = currentUser.name;
                } else if(typeof selectedMember !== 'undefined' && selectedMember.name) {
                    addedByName = selectedMember.name;
                }

                const res = await fetch(API_URL + '/api/aarti', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, date, timeOfDay, phone, pujaDetails, addedBy: addedByName })
                });
                const data = await res.json();
                if(data.success) {
                    e.target.reset();
                    alert('Maha Aarti added successfully!');
                    if(typeof loadMyData === 'function') loadMyData();
                } else alert('Error adding aarti');
            } catch(err) { alert('Server error'); }
            btn.disabled = false;
        }

    
    // Auto-wrap tables for mobile responsiveness
    document.addEventListener('DOMContentLoaded', function() {
        const tables = document.querySelectorAll('table');
        tables.forEach(table => {
            if (!table.parentElement.classList.contains('table-responsive')) {
                const wrapper = document.createElement('div');
                wrapper.className = 'table-responsive';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            }
        });
    });
    
</script>
