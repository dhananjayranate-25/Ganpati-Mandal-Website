<!DOCTYPE html>
<html lang="mr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff8c00">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Shivsrushti Boyz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=17">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="loginContainer" class="container" style="max-width: 700px; margin-top: 40px;">
        <header class="animate-fade-down">
            <div class="header-content">
                <div class="ganpati-image-container">
                    <img src="logo/logo.jpeg" alt="Shivsrushti Logo" class="ganpati-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚩</text></svg>';this.classList.add('fallback-icon')">
                </div>
                <h1 class="title-gradient">Portal Login</h1>
                <div class="subtitle-wrapper">
                    <span class="subtitle-badge">शिवसृष्टी हिंदू तरुण मित्र मंडळ | 🚩</span>
                </div>
            </div>
        </header>
        
        <div class="form-container animate-fade-up" style="animation-delay: 0.2s;">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-grid">
                    <div class="form-group floating-label">
                        <input type="text" id="username" placeholder=" " required="">
                        <label for="username">Username</label>
                        <div class="input-focus-line"></div>
                    </div>
                    
                    <div class="form-group floating-label">
                        <input type="password" id="password" placeholder=" " required="">
                        <label for="password">Password</label>
                        <div class="input-focus-line"></div>
                    </div>
                </div>
                <div class="form-actions" style="margin-top: 20px;">
                    <button type="submit" id="loginBtn" class="btn btn-primary ripple" style="width: 100%;">
                        <span class="btn-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                                <polyline points="11 16 15 12 11 8"></polyline>
                                <line x1="2" y1="12" x2="15" y2="12"></line>
                            </svg>
                        </span>
                        Login
                    </button>
                    <div style="margin-top:12px;">
                        <a href="admin.html" class="btn btn-secondary ripple" style="width:100%;justify-content:center; background: rgba(255, 140, 0, 0.1); color: #ff8c00; border-color: rgba(255, 140, 0, 0.3);">
                            <span class="btn-icon">
                                <i class="fas fa-globe"></i>
                            </span>
                            Website Admin Login
                        </a>
                    </div>
                    <div style="margin-top:12px;">
                        <a href="index.html" class="btn btn-secondary ripple" style="width:100%;justify-content:center;">
                            <span class="btn-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 12h18M3 12l4-4m-4 4l4 4"></path>
                                </svg>
                            </span>
                            Back to Home
                        </a>
                    </div>
                </div>
                <div id="errorMsg" style="color: #ef4444; text-align: center; margin-top: 10px; display: none;">
                    Invalid credentials
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_URL = ''; // Leave empty if same domain
        
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = '<span class="btn-icon"><i class="fas fa-spinner fa-spin"></i></span> Please wait...';
            btn.disabled = true;
            errorMsg.style.display = 'none';
            
            try {
                const res = await fetch(API_URL + '/api/portal/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('portalUser', JSON.stringify(data.user));
                    localStorage.setItem('userRole', data.user.role);
                    
                    if(data.user.role === 'superadmin') {
                        window.location.href = 'superadmin.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (err) {
                errorMsg.innerText = err.message || 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.innerHTML = '<span class="btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="11 16 15 12 11 8"></polyline><line x1="2" y1="12" x2="15" y2="12"></line></svg></span> Login';
                btn.disabled = false;
            }
        }
        
        // Prevent going back to login if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('portalUser');
            const userRole = localStorage.getItem('userRole');
            if (userStr && userRole) {
                if(userRole === 'superadmin') window.location.href = 'superadmin.html';
                if(userRole === 'member') window.location.href = 'member.html';
            }
        });
    </script>
</body>
</html>
