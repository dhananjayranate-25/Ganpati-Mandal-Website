<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Portal - Shivsrushti Boyz</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #d4af37;
            --dark: #121212;
            --darker: #0a0a0a;
            --light: #f4f4f4;
            --danger: #ff4444;
            --success: #00C851;
            --info: #33b5e5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--darker);
            color: var(--light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background: var(--dark);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar h2 { margin: 0; color: var(--primary); }
        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            margin-top: 0;
            color: #ccc;
            font-size: 1rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0 0 0;
        }

        .lists-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 900px) {
            .lists-grid { grid-template-columns: 1fr; }
        }

        .list-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }
        .list-header h3 { margin: 0; color: #ccc; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.pending { background: rgba(255,68,68,0.2); color: var(--danger); }
        .badge.process { background: rgba(51,181,229,0.2); color: var(--info); }
        .badge.done { background: rgba(0,200,81,0.2); color: var(--success); }

        .btn {
            background: var(--primary);
            color: var(--darker);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
        }
        .btn-small { padding: 4px 8px; font-size: 0.8rem; }
        
        select.form-control {
            background: var(--dark);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 5px;
            border-radius: 4px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }
        .modal-title { margin-top: 0; color: var(--primary); }
        .form-control-full {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .empty-state { text-align: center; color: #666; margin: 20px 0; }
    
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .floating-label {
            position: relative;
            margin-bottom: 20px;
        }
        .floating-label input,
        .floating-label select,
        .floating-label textarea {
            width: 100%;
            padding: 24px 16px 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .floating-label label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            pointer-events: none;
            font-size: 1rem;
        }
        .floating-label textarea ~ label {
            top: 24px;
        }
        .floating-label input:focus,
        .floating-label select:focus,
        .floating-label textarea:focus {
            outline: none;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.05);
        }
        .floating-label input:focus + label,
        .floating-label input:not(:placeholder-shown) + label,
        .floating-label select:focus + label,
        .floating-label select:not([value=""]) + label,
        .floating-label textarea:focus + label,
        .floating-label textarea:not(:placeholder-shown) + label {
            top: 8px;
            font-size: 0.75rem;
            color: #ffcc00;
        }

    
        /* Premium Mobile Responsiveness */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .navbar h2 {
                font-size: 1.5rem;
            }
            .main-content {
                padding: 15px;
                gap: 20px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .lists-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .list-container {
                padding: 15px;
            }
            .list-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .list-header .btn {
                width: 100%;
                text-align: center;
            }
            .item-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .item-row > div:first-child {
                width: 100%;
                word-wrap: break-word;
            }
            .item-row select, .item-row .badge {
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
            .floating-label input,
            .floating-label select,
            .floating-label textarea {
                padding: 22px 12px 6px;
                font-size: 0.95rem;
            }
            .form-grid {
                gap: 15px;
            }
            /* Make buttons inside cards full width on mobile */
            div[style*="justify-content:flex-end"] {
                flex-direction: column;
                gap: 10px !important;
            }
            div[style*="justify-content:flex-end"] button {
                width: 100%;
                justify-content: center;
            }
            
            /* Responsive timeline layout for mobile */
            div[style*="border-left: 3px solid"] {
                padding: 12px !important;
                margin-bottom: 12px !important;
            }
            div[style*="justify-content: space-between"] {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 8px;
            }
        }

    </style>
</head>
<body>


    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="position: relative; cursor: pointer;" onclick="document.getElementById('profilePhotoInput').click()">
                <img id="profilePhotoPreview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e0e0e0'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23bdbdbd'/%3E%3Cpath d='M20,90 Q50,50 80,90' stroke='%23bdbdbd' stroke-width='10' fill='none'/%3E%3C/svg%3E" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
                <div style="position: absolute; bottom: -5px; right: -5px; background: var(--primary); color: #000; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px;"><i class="fas fa-camera"></i></div>
            </div>
            <input type="file" id="profilePhotoInput" style="display: none;" accept="image/*" onchange="uploadProfilePhoto(this)">
            <h2><span id="welcomeName">Member</span></h2>
        </div>
        <button class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>


    <div class="main-content">
        <!-- Accounts Summary -->
        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Funds Given <i class="fas fa-wallet text-muted"></i></h3>
                <p class="stat-value" id="statTotalFunds">₹0</p>
            </div>
            <div class="card">
                <h3>Total Spent <i class="fas fa-shopping-cart text-muted"></i></h3>
                <p class="stat-value" id="statTotalSpent" style="color: var(--danger);">₹0</p>
            </div>
            <div class="card">
                <h3>Remaining Balance <i class="fas fa-piggy-bank text-muted"></i></h3>
                <p class="stat-value" id="statBalance" style="color: var(--success);">₹0</p>
            </div>
        </div>

        <div class="lists-grid">
            <!-- Tasks List -->
            <div class="list-container">
                <div class="list-header">
                    <h3>My Tasks (काय काम आहे)</h3>
                </div>
                <div id="tasksList">
                    <!-- Tasks load here -->
                </div>
            </div>

            <!-- Expenses List -->
            <div class="list-container">
                <div class="list-header">
                    <h3>My Expenses (खर्च)</h3>
                    <button class="btn btn-small" onclick="openModal('addExpenseModal')"><i class="fas fa-plus"></i> Log Expense</button>
                </div>
                <div id="expensesList">
                    <!-- Expenses load here -->
                </div>
            </div>
        </div>

        <div class="lists-grid" style="margin-top: 30px;">
            <!-- Add Niyojan Card -->
            <div class="list-container">
                <div class="list-header">
                    <h3>उत्सव नियोजन जोडा (Add Niyojan)</h3>
                </div>
                <div style="padding: 15px;">
                    <form onsubmit="addNiyojan(event)">
                            <div class="form-grid">
                                <div class="form-group floating-label">
                                    <input type="date" id="NiyojanDate" placeholder=" " required>
                                    <label for="NiyojanDate">तारीख</label>
                                </div>
                                <div class="form-group floating-label">
                                    <input type="time" id="NiyojanTime" placeholder=" " required>
                                    <label for="NiyojanTime">वेळ</label>
                                </div>
                                <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                    <input type="text" id="NiyojanTitle" placeholder=" " required>
                                    <label for="NiyojanTitle">कार्यक्रमाचे नाव</label>
                                </div>
                                <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                    <textarea id="NiyojanDesc" placeholder=" " rows="3"></textarea>
                                    <label for="NiyojanDesc">अधिक माहिती (पर्यायी)</label>
                                </div>
                            </div>
                            <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1.1rem; border-radius: 8px;">नियोजन जोडा</button>
                        </form>
                </div>
            </div>

            <!-- Add Aarti Card -->
            <div class="list-container">
                <div class="list-header">
                    <h3>महाआरती जोडा (Add Aarti)</h3>
                </div>
                <div style="padding: 15px;">
                    <form onsubmit="addAarti(event)" class="form-grid">
                            <div class="form-group floating-label">
                                <input type="text" id="AartiName" placeholder=" " required>
                                <label for="AartiName">नाव</label>
                            </div>
                            <div class="form-group floating-label">
                                <input type="date" id="AartiDate" placeholder=" " required>
                                <label for="AartiDate">तारीख</label>
                            </div>
                            <div class="form-group floating-label select-group">
                                <select id="AartiTime" required>
                                    <option value="सकाळ">सकाळ</option>
                                    <option value="संध्याकाळ">संध्याकाळ</option>
                                </select>
                                <label for="AartiTime">वेळ (सकाळ/संध्याकाळ)</label>
                            </div>
                            <div class="form-group floating-label">
                                <input type="text" id="AartiPhone" placeholder=" ">
                                <label for="AartiPhone">फोन नंबर</label>
                            </div>
                            <div class="form-group floating-label" style="grid-column: 1 / -1;">
                                <textarea id="AartiDetails" placeholder=" " rows="2"></textarea>
                                <label for="AartiDetails">पूजा माहिती (ऐच्छिक)</label>
                            </div>
                            <div style="grid-column: 1 / -1;">
                                <button type="submit" class="btn" style="width: 100%; margin-top: 5px; padding: 12px; font-size: 1.1rem; border-radius: 8px;">आरती जोडा</button>
                            </div>
                        </form>
                </div>
            </div>
        </div>

            <div class="lists-grid" style="margin-top: 30px;">
                <!-- My Niyojan List -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>मी जोडलेले उत्सव नियोजन</h3>
                    </div>
                    <div style="flex:1; overflow-y:auto;" id="myNiyojanList">
                        <!-- load here -->
                    </div>
                </div>

                <!-- My Aarti List -->
                <div class="list-container">
                    <div class="list-header">
                        <h3>मी जोडलेली महाआरती</h3>
                    </div>
                    <div style="flex:1; overflow-y:auto;" id="myAartiList">
                        <!-- load here -->
                    </div>
                </div>
            </div>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal" id="addExpenseModal">
        <div class="modal-content">
            <h3 class="modal-title">Log New Expense</h3>
            <p style="font-size:0.85rem; color:#888;">This will be deducted from your remaining balance.</p>
            <form onsubmit="addExpense(event)">
                <input type="text" id="expItem" class="form-control-full" placeholder="Item Name (वस्तूचे नाव)" required>
                <input type="number" id="expPrice" class="form-control-full" placeholder="Price / Amount (₹)" required min="1">
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;

        window.onload = () => {
            const userStr = localStorage.getItem('portalUser');
            if(!userStr) return window.location.href = 'login.html';
            currentUser = JSON.parse(userStr);
            if(currentUser.role !== 'member') return window.location.href = 'login.html';
            
            document.getElementById('welcomeName').innerText = currentUser.name;
            refreshData();
    
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData();
        };

        function logout() {
            localStorage.removeItem('portalUser');
            window.location.href = 'login.html';
        }

        function openModal(id) {
            closeModals();
            document.getElementById(id).classList.add('active');
        }
        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        async function refreshData() {
            try {
                // Fetch user data for balance
                let res = await fetch(API_URL + '/api/portal/users/' + currentUser.id);
                let data = await res.json();
                if(data.success) {
                    document.getElementById('statTotalFunds').innerText = '₹' + data.user.totalFunds;
                    document.getElementById('statTotalSpent').innerText = '₹' + data.user.totalSpent;
                    document.getElementById('statBalance').innerText = '₹' + data.user.balance;
                }

                // Fetch tasks
                res = await fetch(API_URL + '/api/portal/tasks/' + currentUser.id);
                data = await res.json();
                if(data.success) {
                    document.getElementById('tasksList').innerHTML = data.tasks.length ? data.tasks.map(t => `
                        <div class="item-row">
                            <div>
                                <div style="font-weight:500;">${t.title}</div>
                                <div style="font-size:0.75rem; color:#888;">${new Date(t.date).toLocaleDateString()}</div>
                            </div>
                            <div>
                                <select class="form-control" onchange="updateTaskStatus('${t._id}', this.value)">
                                    <option value="Pending" ${t.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="In Process" ${t.status==='In Process'?'selected':''}>In Process</option>
                                    <option value="Done" ${t.status==='Done'?'selected':''}>Done</option>
                                </select>
                            </div>
                        </div>
                    `).join('') : '<p class="empty-state">No tasks assigned to you yet.</p>';
                }

                // Fetch expenses
                res = await fetch(API_URL + '/api/portal/expenses/' + currentUser.id);
                data = await res.json();
                if(data.success) {
                    document.getElementById('expensesList').innerHTML = data.expenses.length ? data.expenses.map(e => `
                        <div class="item-row">
                            <div>
                                <div style="font-weight:500;">${e.item}</div>
                                <div style="font-size:0.75rem; color:#888;">${new Date(e.date).toLocaleDateString()}</div>
                            </div>
                            <span style="color:var(--danger); font-weight:bold;">₹${e.price}</span>
                        </div>
                    `).join('') : '<p class="empty-state">No expenses logged yet.</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function updateTaskStatus(taskId, status) {
            try {
                await fetch(API_URL + '/api/portal/tasks/' + taskId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status })
                });
                // Optional: show a small toast notification here
            } catch(err) {
                alert('Failed to update status');
            }
        }

        async function addExpense(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const res = await fetch(API_URL + '/api/portal/expenses', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: currentUser.id,
                        item: document.getElementById('expItem').value,
                        price: document.getElementById('expPrice').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    closeModals();
                    e.target.reset();
                    refreshData();
    
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData(); // updates the balance and list
                } else alert(data.message);
            } catch(err) { alert('Error logging expense'); }
            btn.disabled = false;
        }
    
        async function addNiyojan(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const date = document.getElementById('NiyojanDate').value;
                const time = document.getElementById('NiyojanTime').value;
                const title = document.getElementById('NiyojanTitle').value;
                const description = document.getElementById('NiyojanDesc').value;
                
                // Get name based on page
                let addedByName = '';
                if(typeof currentUser !== 'undefined' && currentUser.name) {
                    addedByName = currentUser.name;
                } else if(typeof selectedMember !== 'undefined' && selectedMember.name) {
                    addedByName = selectedMember.name; // Superadmin portal
                }

                const res = await fetch(API_URL + '/api/niyojan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ date, time, title, description, addedBy: addedByName })
                });
                const data = await res.json();
                if(data.success) {
                    e.target.reset();
                    alert('Niyojan added successfully!');
                    if(typeof loadMyData === 'function') loadMyData();
                } else alert('Error adding niyojan');
            } catch(err) { alert('Server error'); }
            btn.disabled = false;
        }

        async function addAarti(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            try {
                const name = document.getElementById('AartiName').value;
                const date = document.getElementById('AartiDate').value;
                const timeOfDay = document.getElementById('AartiTime').value;
                const phone = document.getElementById('AartiPhone').value;
                const pujaDetails = document.getElementById('AartiDetails').value;
                
                let addedByName = '';
                if(typeof currentUser !== 'undefined' && currentUser.name) {
                    addedByName = currentUser.name;
                } else if(typeof selectedMember !== 'undefined' && selectedMember.name) {
                    addedByName = selectedMember.name;
                }

                const res = await fetch(API_URL + '/api/aarti', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, date, timeOfDay, phone, pujaDetails, addedBy: addedByName })
                });
                const data = await res.json();
                if(data.success) {
                    e.target.reset();
                    alert('Maha Aarti added successfully!');
                    if(typeof loadMyData === 'function') loadMyData();
                } else alert('Error adding aarti');
            } catch(err) { alert('Server error'); }
            btn.disabled = false;
        }

    

        async function uploadProfilePhoto(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const formData = new FormData();
            formData.append('photo', file);

            try {
                // Show loading on image
                document.getElementById('profilePhotoPreview').style.opacity = '0.5';
                
                const res = await fetch(`${API_URL}/users/${currentUser._id}/photo`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    // Update current user
                    currentUser.photoUrl = data.photoUrl;
                    localStorage.setItem('portalUser', JSON.stringify(currentUser));
                    document.getElementById('profilePhotoPreview').src = data.photoUrl;
                    alert('प्रोफाईल फोटो यशस्वीरित्या अपडेट झाला!');
                } else {
                    alert('फोटो अपडेट करताना त्रुटी: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Server Error');
            } finally {
                document.getElementById('profilePhotoPreview').style.opacity = '1';
                input.value = ''; // Reset input
            }
        }

        async function loadMyData() {
            try {
                // Fetch Niyojan
                let res = await fetch(API_URL + '/api/niyojan');
                let data = await res.json();
                if(Array.isArray(data) || data.success) {
                    let niyojanList = Array.isArray(data) ? data : data.niyojan;
                    let myNiyojan = niyojanList.filter(n => n.addedBy === currentUser.name);
                    let niyojanHtml = '';
                    myNiyojan.forEach((n, index) => {
                        let formattedDate = new Date(n.date).toLocaleDateString('mr-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                        let time12 = n.time;
                        if(n.time) {
                            let parts = n.time.split(':');
                            if(parts.length === 2) {
                                let h = parseInt(parts[0]);
                                let m = parts[1];
                                let ampm = h >= 12 ? 'PM' : 'AM';
                                h = h % 12 || 12;
                                time12 = `${h}:${m} ${ampm}`;
                            }
                        }
                        
                        niyojanHtml += `
                        <div style="background: rgba(255,255,255,0.05); border-left: 3px solid #d4af37; padding: 15px; border-radius: 8px; margin-bottom: 15px; position:relative;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <span style="color: #ffcc00; font-weight: bold;">${formattedDate}</span>
                                <span style="background: rgba(212,175,55,0.2); color: #ffeb3b; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem;"><i class="far fa-clock"></i> ${time12}</span>
                            </div>
                            <h3 style="color: #fff; margin: 0 0 5px 0; font-size: 1.1rem;">${n.title}</h3>
                            ${n.description ? `<p style="color: #ccc; font-size: 0.85rem; margin: 0 0 10px 0;">${n.description}</p>` : ''}
                            
                            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
                                <button class="btn btn-outline btn-small" onclick="editNiyojan('${n._id}', '${n.title.replace(/'/g, "\'")}')"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn btn-small" style="background:#ff4444; color:white; border:none;" onclick="deleteNiyojan('${n._id}')"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                        `;
                    });
                    document.getElementById('myNiyojanList').innerHTML = niyojanHtml || '<p class="empty-state">अद्याप कोणतेही नियोजन जोडलेले नाही.</p>';
                }

                // Fetch Aarti
                res = await fetch(API_URL + '/api/aarti');
                data = await res.json();
                if(Array.isArray(data) || data.success) {
                    let aartiList = Array.isArray(data) ? data : data.aarti;
                    let myAarti = aartiList.filter(a => a.addedBy === currentUser.name);
                    let aartiHtml = '';
                    myAarti.forEach((a, index) => {
                        let formattedDate = new Date(a.date).toLocaleDateString('mr-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                        
                        aartiHtml += `
                        <div style="background: rgba(255,255,255,0.05); border-left: 3px solid #ffcc00; padding: 15px; border-radius: 8px; margin-bottom: 15px; position:relative;">
                            <h3 style="color: #ffeb3b; margin: 0 0 10px 0; font-size: 1.1rem;">${a.name}</h3>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; color: #fff; font-size: 0.85rem; margin-bottom: 10px;">
                                <div><i class="far fa-calendar-alt" style="color: #d4af37;"></i> ${formattedDate}</div>
                                <div><i class="far fa-clock" style="color: #d4af37;"></i> ${a.timeOfDay}</div>
                                ${a.phone ? `<div style="grid-column: 1 / -1;"><i class="fas fa-phone-alt" style="color: #d4af37;"></i> ${a.phone}</div>` : ''}
                            </div>
                            ${a.pujaDetails ? `<div style="color: #ccc; font-size: 0.85rem; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px;">${a.pujaDetails}</div>` : ''}
                            
                            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
                                <button class="btn btn-outline btn-small" onclick="editAarti('${a._id}', '${a.name.replace(/'/g, "\'")}')"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn btn-small" style="background:#ff4444; color:white; border:none;" onclick="deleteAarti('${a._id}')"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                        `;
                    });
                    document.getElementById('myAartiList').innerHTML = aartiHtml || '<p class="empty-state">अद्याप कोणतीही महाआरती जोडलेली नाही.</p>';
                }
            } catch(e) { console.error(e); }
        }

        async function deleteNiyojan(id) {
            if(!confirm('Are you sure you want to delete this?')) return;
            try {
                const res = await fetch(API_URL + '/api/niyojan/' + id, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) {
                    alert('Deleted successfully');
        
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData();
                } else alert('Error deleting');
            } catch(e) { alert('Server error'); }
        }

        async function deleteAarti(id) {
            if(!confirm('Are you sure you want to delete this?')) return;
            try {
                const res = await fetch(API_URL + '/api/aarti/' + id, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) {
                    alert('Deleted successfully');
        
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData();
                } else alert('Error deleting');
            } catch(e) { alert('Server error'); }
        }

        async function editNiyojan(id, oldName) {
            const newName = prompt('Enter new title for Niyojan:', oldName);
            if(!newName || newName === oldName) return;
            // For simplicity, we only update title here, but real edit could open a modal
            try {
                const res = await fetch(API_URL + '/api/niyojan/' + id, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title: newName })
                });
                const data = await res.json();
                if(data.success) {
                    alert('Updated successfully');
        
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData();
                } else alert('Error updating');
            } catch(e) { alert('Server error'); }
        }

        async function editAarti(id, oldName) {
            const newName = prompt('Enter new name for Aarti:', oldName);
            if(!newName || newName === oldName) return;
            try {
                const res = await fetch(API_URL + '/api/aarti/' + id, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: newName })
                });
                const data = await res.json();
                if(data.success) {
                    alert('Updated successfully');
        
            if(currentUser.photoUrl) {
                document.getElementById('profilePhotoPreview').src = currentUser.photoUrl;
            }
            loadMyData();
                } else alert('Error updating');
            } catch(e) { alert('Server error'); }
        }

    </script>
